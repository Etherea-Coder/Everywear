workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - Supabase
        - everywear_secret
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Clean build cache
        script: flutter clean
      - name: Print keystore SHA-1
        script: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null || echo "No debug keystore found"
      - name: Build APK
        script: flutter build apk --release --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY --dart-define=SENTRY_DSN=$SENTRY_DSN
      - name: Print APK signature
        script: keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk 2>/dev/null | grep SHA1 || echo "Could not read APK cert"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
  web-workflow:
    name: Web Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - Supabase
        - everywear_secret
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Web
        script: flutter build web --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY --dart-define=SENTRY_DSN=$SENTRY_DSN
    artifacts:
      - build/web/**