workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - Supabase
        - Stripe
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Clean build cache
        script: flutter clean
      - name: Build APK
        script: flutter build apk --release --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
  web-workflow:
    name: Web Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - Supabase
        - Stripe
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Web
        script: flutter build web --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
    artifacts:
      - build/web/**
